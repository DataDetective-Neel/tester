name: "Build & Deploy Flask App"

on:
  push:
    branches: [main, staging, pre-prod, production]
    paths:
      - 'flask_app/**'
      - '.github/workflows/docker-deploy.yml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-flask-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.ref_name }} .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.ref_name }}

      - name: Deploy Container
        run: |
          BRANCH=${{ github.ref_name }}

          if [ "$BRANCH" == "staging" ]; then
            PORT=5001
          elif [ "$BRANCH" == "pre-prod" ]; then
            PORT=5002
          elif [ "$BRANCH" == "production" ]; then
            PORT=5003
          elif [ "$BRANCH" == "main" ]; then
            PORT=5000
          else
            echo "No deployment port configured for branch: $BRANCH"
            exit 1
          fi

          docker pull $IMAGE_NAME:$BRANCH

          docker rm -f $BRANCH-app || true

          docker run -d -p $PORT:5000 \
            --name $BRANCH-app \
            -e ENVIRONMENT=$BRANCH \
            $IMAGE_NAME:$BRANCH